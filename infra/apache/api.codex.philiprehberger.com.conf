# Canonical vhost — keep in sync with /etc/apache2/sites-available/api.codex.philiprehberger.com.conf.
# Certbot will append the matching -le-ssl.conf companion on first --apache run.

<VirtualHost *:80>
    ServerName api.codex.philiprehberger.com
    DocumentRoot /var/www/codex/current/public

    <Directory /var/www/codex/current/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/codex-api-error.log
    CustomLog ${APACHE_LOG_DIR}/codex-api-access.log combined
</VirtualHost>
