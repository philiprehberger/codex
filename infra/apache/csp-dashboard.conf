# CSP for codex.philiprehberger.com (Next.js dashboard host).
#
# Tailwind 4 compiles to static classes — no inline styles emitted by
# the framework itself. No 'unsafe-inline' on style-src; if a specific
# library adds inline styles in Phase 2, allow via nonce, not by
# re-enabling 'unsafe-inline' globally.
#
# script-src 'self' is enough for the static Next.js bundle. Plausible
# analytics ships from plausible.philiprehberger.com (self-hosted on
# the same EC2 box per Phase 8 §6).

<IfModule mod_headers.c>
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' https://plausible.philiprehberger.com; style-src 'self'; img-src 'self' https://api.codex.philiprehberger.com data:; font-src 'self'; connect-src 'self' https://api.codex.philiprehberger.com https://plausible.philiprehberger.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
</IfModule>
