# CSP for api.codex.philiprehberger.com, EXCLUDING /admin.
#
# The api host serves JSON only outside /admin. CSP is mostly
# precautionary since there's no UI to inject into — but the same
# headers stop a hypothetical RFC 7807 problem-detail body from
# triggering script execution via a malformed user agent.
#
# /admin is Filament UI with inline scripts; csp-admin.conf wires
# the nonce-based CSP via AdminCspMiddleware (Phase 3).

<IfModule mod_headers.c>
    # Skip /admin — AdminCspMiddleware emits a per-request nonce CSP there.
    <LocationMatch "^/(?!admin)">
        Header always set Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'self'"
    </LocationMatch>
</IfModule>
