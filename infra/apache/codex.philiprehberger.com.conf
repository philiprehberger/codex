# Canonical vhost for the dashboard / marketing site. Reverse-proxies to PM2.
# Port chosen by scripts/deploy/preflight.sh; placeholder below.

<VirtualHost *:80>
    ServerName codex.philiprehberger.com

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass        / http://127.0.0.1:3012/
    ProxyPassReverse / http://127.0.0.1:3012/

    ErrorLog ${APACHE_LOG_DIR}/codex-web-error.log
    CustomLog ${APACHE_LOG_DIR}/codex-web-access.log combined
</VirtualHost>
