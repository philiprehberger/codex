# codex.philiprehberger.com — Next.js dashboard host.
#
# Reverse-proxies to the PM2 'codex-web' process. Port chosen by
# scripts/deploy/preflight.sh; default 3012 (next free above inkwell's
# 3011) — update in lockstep with /var/www/ecosystem.config.js if the
# port changes.
#
# After `sudo certbot --apache -d codex.philiprehberger.com -d
# api.codex.philiprehberger.com`, certbot appends a -le-ssl.conf
# companion that handles :443. Keep both files in sync with this
# canonical pair so a re-run of certbot doesn't drift.

<VirtualHost *:80>
    ServerName codex.philiprehberger.com

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass        / http://127.0.0.1:3012/
    ProxyPassReverse / http://127.0.0.1:3012/

    Include /var/www/codex/infra/apache/security-headers-common.conf
    Include /var/www/codex/infra/apache/csp-dashboard.conf

    # Don't log the BetterStack health pings.
    SetEnvIf Request_URI "^/(api/revalidate)$" dontlog

    ErrorLog ${APACHE_LOG_DIR}/codex-web-error.log
    CustomLog ${APACHE_LOG_DIR}/codex-web-access.log combined env=!dontlog
</VirtualHost>
